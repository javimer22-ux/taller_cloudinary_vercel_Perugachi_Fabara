<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir imagen a Cloudinary</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f1f5f9; margin:0; padding:40px; }
    .container { max-width:600px; margin:auto; background:white; padding:24px; border-radius:18px; box-shadow:0 10px 30px #0002; }
    input, button { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #cbd5e1; box-sizing:border-box; }
    button { background:#0284c7; color:white; font-weight:bold; cursor:pointer; border:none; }
    button:hover { background:#0369a1; }
    img { max-width:100%; border-radius:14px; margin-top:18px; }
    .url { word-break:break-all; background:#e0f2fe; padding:12px; border-radius:10px; }
    #estado { font-style:italic; color:#64748b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Subir imagen a Cloudinary</h1>
    <p>Selecciona una imagen y súbela usando el backend publicado en Vercel.</p>

    <form id="formUpload">
      <input type="file" id="imagen" name="imagen" accept="image/*" required />
      <button type="submit">Subir imagen</button>
    </form>

    <p id="estado"></p>
    <div id="resultado"></div>
  </div>

  <script>
    const form = document.getElementById("formUpload");
    const estado = document.getElementById("estado");
    const resultado = document.getElementById("resultado");

    // En local puede ser: http://localhost:3000
    // En Vercel puede quedar vacío si frontend y backend están en el mismo proyecto.
    const API_URL = "";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      estado.textContent = "Subiendo imagen...";
      resultado.innerHTML = "";

      const archivo = document.getElementById("imagen").files[0];
      const formData = new FormData();
      formData.append("imagen", archivo);

      try {
        const response = await fetch(`${API_URL}/api/upload`, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Error desconocido");
        }

        estado.textContent = data.message;
        resultado.innerHTML = `
          <h3>Imagen subida:</h3>
          <img src="${data.url}" alt="Imagen subida" />
          <p class="url">${data.url}</p>
        `;
      } catch (error) {
        estado.textContent = "Error: " + error.message;
      }
    });
  </script>
</body>
</html>
